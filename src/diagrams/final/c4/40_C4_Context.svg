<svg xmlns="http://www.w3.org/2000/svg" width="1840" height="854" viewBox="0 0 1840 854">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
    <style>
      .title{font-family:Arial, Helvetica, sans-serif;font-size:24px;font-weight:700;fill:#000}
      .subtitle{font-family:Arial, Helvetica, sans-serif;font-size:16px;fill:#000}
      .box-title{font-family:Arial, Helvetica, sans-serif;font-size:22px;font-weight:700;fill:#111}
      .box-sub{font-family:Arial, Helvetica, sans-serif;font-size:15px;fill:#111}
      .desc{font-family:Arial, Helvetica, sans-serif;font-size:17px;fill:#111}
      .small{font-family:Arial, Helvetica, sans-serif;font-size:14px;fill:#111}
      .label{font-family:Arial, Helvetica, sans-serif;font-size:14px;fill:#000}
      .stroke{stroke:#111;stroke-width:1.6;fill:none}
      .arrow{stroke:#111;stroke-width:1.7;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#111;stroke-width:1.5;fill:none;stroke-dasharray:7 7;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1840" height="854" fill="#fff"/>

  <text x="920" y="26" text-anchor="middle" class="title">C4 Context — Маркетплейс вакансий и стажировок</text>
  <text x="920" y="54" text-anchor="middle" class="subtitle">Общий контекст системы: пользователи, платформа и внешние сервисы</text>

  <!-- Actor boxes -->
  <g id="student">
    <rect x="50" y="100" width="350" height="165" rx="7" fill="#f4f4f4" stroke="#111" stroke-width="1.3"/>
    <text x="200" y="122" text-anchor="middle" class="small">[Person]</text>
    <circle cx="200" cy="143" r="10" class="stroke"/>
    <path d="M170 182 C176 160, 224 160, 230 182" class="stroke"/>
    <text x="200" y="204" text-anchor="middle" class="box-title">Студент</text>
    <text x="200" y="235" text-anchor="middle" class="desc">Ищет вакансии, получает</text>
    <text x="200" y="258" text-anchor="middle" class="desc">рекомендации, отправляет отклики</text>
  </g>

  <g id="employer">
    <rect x="50" y="300" width="350" height="165" rx="7" fill="#f4f4f4" stroke="#111" stroke-width="1.3"/>
    <text x="200" y="322" text-anchor="middle" class="small">[Person]</text>
    <circle cx="200" cy="343" r="10" class="stroke"/>
    <path d="M170 382 C176 360, 224 360, 230 382" class="stroke"/>
    <text x="200" y="404" text-anchor="middle" class="box-title">Работодатель</text>
    <text x="200" y="435" text-anchor="middle" class="desc">Публикует вакансии и рассматривает</text>
    <text x="200" y="458" text-anchor="middle" class="desc">отклики</text>
  </g>

  <g id="career">
    <rect x="50" y="500" width="350" height="165" rx="7" fill="#f4f4f4" stroke="#111" stroke-width="1.3"/>
    <text x="200" y="522" text-anchor="middle" class="small">[Person]</text>
    <circle cx="200" cy="543" r="10" class="stroke"/>
    <path d="M170 582 C176 560, 224 560, 230 582" class="stroke"/>
    <text x="200" y="604" text-anchor="middle" class="box-title">Карьерный центр</text>
    <text x="200" y="635" text-anchor="middle" class="desc">Контролирует процесс и получает</text>
    <text x="200" y="658" text-anchor="middle" class="desc">отчёты</text>
  </g>

  <g id="moderator">
    <rect x="50" y="700" width="350" height="120" rx="7" fill="#f4f4f4" stroke="#111" stroke-width="1.3"/>
    <text x="200" y="722" text-anchor="middle" class="small">[Person]</text>
    <circle cx="200" cy="743" r="10" class="stroke"/>
    <path d="M170 782 C176 760, 224 760, 230 782" class="stroke"/>
    <text x="200" y="804" text-anchor="middle" class="box-title">Модератор</text>
    <text x="200" y="834" text-anchor="middle" class="desc">Проверяет вакансии и жалобы</text>
  </g>

  <!-- Main system -->
  <g id="system">
    <rect x="740" y="300" width="560" height="250" rx="8" fill="#dcebd8" stroke="#111" stroke-width="1.3"/>
    <text x="1020" y="328" text-anchor="middle" class="box-sub">[Software System]</text>
    <text x="1020" y="358" text-anchor="middle" class="box-title">Career Marketplace System</text>
    <text x="1020" y="404" text-anchor="middle" class="desc">Платформа для публикации вакансий, подбора студентов,</text>
    <text x="1020" y="428" text-anchor="middle" class="desc">откликов, интервью, модерации и аналитики</text>
  </g>

  <!-- External systems -->
  <g id="recommendation">
    <rect x="1530" y="140" width="260" height="135" rx="7" fill="#fff5d7" stroke="#111" stroke-width="1.3"/>
    <text x="1660" y="165" text-anchor="middle" class="box-sub">[External System]</text>
    <text x="1660" y="195" text-anchor="middle" class="box-title">Recommendation Service</text>
    <text x="1660" y="230" text-anchor="middle" class="desc">Подбор релевантных вакансий для</text>
    <text x="1660" y="254" text-anchor="middle" class="desc">студентов</text>
  </g>

  <g id="mail">
    <rect x="1530" y="370" width="260" height="110" rx="7" fill="#fff5d7" stroke="#111" stroke-width="1.3"/>
    <text x="1660" y="395" text-anchor="middle" class="box-sub">[External System]</text>
    <text x="1660" y="425" text-anchor="middle" class="box-title">Mail Gateway</text>
    <text x="1660" y="460" text-anchor="middle" class="desc">Отправка email-уведомлений</text>
  </g>

  <g id="calendar">
    <rect x="1530" y="600" width="260" height="110" rx="7" fill="#fff5d7" stroke="#111" stroke-width="1.3"/>
    <text x="1660" y="625" text-anchor="middle" class="box-sub">[External System]</text>
    <text x="1660" y="655" text-anchor="middle" class="box-title">Calendar Service</text>
    <text x="1660" y="690" text-anchor="middle" class="desc">Создание событий интервью</text>
  </g>

  <!-- Note -->
  <g id="note">
    <rect x="740" y="700" width="560" height="120" rx="7" fill="#fffde0" stroke="#111" stroke-width="1.3"/>
    <text x="1020" y="725" text-anchor="middle" class="box-sub">[Note]</text>
    <text x="1020" y="755" text-anchor="middle" class="box-title">Назначение уровня Context</text>
    <text x="1020" y="788" text-anchor="middle" class="desc">На этой диаграмме не показываются контроллеры,</text>
    <text x="1020" y="810" text-anchor="middle" class="desc">репозитории и базы данных — только границы системы и её</text>
    <text x="1020" y="832" text-anchor="middle" class="desc">окружение.</text>
  </g>

  <!-- Connectors: properly attached to box borders -->
  <path d="M400 182 H640 V300" class="arrow"/>
  <text x="585" y="170" text-anchor="middle" class="label">использует</text>

  <path d="M400 382 H740" class="arrow"/>
  <text x="585" y="370" text-anchor="middle" class="label">публикует вакансии</text>

  <path d="M400 582 H740" class="arrow"/>
  <text x="585" y="570" text-anchor="middle" class="label">просматривает отчёты</text>

  <path d="M400 760 H740" class="arrow"/>
  <text x="585" y="748" text-anchor="middle" class="label">модерирует</text>

  <path d="M1300 350 H1370 V207 H1530" class="arrow"/>
  <text x="1435" y="190" text-anchor="middle" class="label">запрашивает рекомендации</text>

  <path d="M1300 425 H1530" class="arrow"/>
  <text x="1430" y="410" text-anchor="middle" class="label">отправляет уведомления</text>

  <path d="M1300 500 H1370 V655 H1530" class="arrow"/>
  <text x="1437" y="640" text-anchor="middle" class="label">создаёт события интервью</text>

  <path d="M1020 550 V700" class="dash"/>
  <text x="940" y="635" text-anchor="middle" class="label">уточнение уровня</text>
</svg>
